name: Test Architect Session

# Opens an interactive SSH session into the GitHub Actions runner,
# from which you can exec directly into the architect container.
#
# Works from mobile via any SSH client (Termius, etc).
#
# How to use:
# 1. Run this workflow from GitHub Actions (Actions tab → Run workflow)
# 2. Watch the workflow log — it will print an SSH command and a
#    web URL within ~30 seconds
# 3. Connect from your SSH client (or the web URL — no app needed)
# 4. You are now in the GitHub Actions runner shell
# 5. Run: az containerapp exec --name architect \
#            --resource-group rg-aos-staging --command /bin/bash
# 6. You are now inside the architect container
# 7. When done, type 'exit' twice (once for container, once for runner)
#    The workflow ends automatically when you disconnect.
#
# The workflow will wait up to 30 minutes for you to connect and
# finish. If you don't connect, it times out and exits cleanly.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-session:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure architect container is running
        run: |
          HEALTH=$(az containerapp revision list \
            --name architect \
            --resource-group rg-aos-staging \
            --query "[0].properties.healthState" -o tsv)
          echo "Current health: $HEALTH"
          if [ "$HEALTH" != "Healthy" ]; then
            REVISION=$(az containerapp show \
              --name architect \
              --resource-group rg-aos-staging \
              --query properties.latestRevisionName -o tsv)
            echo "Restarting revision: $REVISION"
            az containerapp revision restart \
              --name architect \
              --resource-group rg-aos-staging \
              --revision "$REVISION"
            echo "Waiting 60s for cold start..."
            sleep 60
            HEALTH=$(az containerapp revision list \
              --name architect \
              --resource-group rg-aos-staging \
              --query "[0].properties.healthState" -o tsv)
            echo "Health after restart: $HEALTH"
          fi

      - name: Open SSH session (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          # Limit access to the person who triggered the workflow
          # (their GitHub username) — prevents others from connecting
          limit-access-to-actor: true
        # The step completes when you disconnect from the SSH session
        # or when the job times out (30 minutes, set above)
