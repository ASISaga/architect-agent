      - name: Run test shell session
        run: |
          echo "=== Starting test shell session ==="
          
          # Pass the heredoc directly into the pseudo-TTY created by script
          script -q -c "az containerapp exec --name architect --resource-group rg-aos-staging --command /bin/bash" /dev/null << 'SHELL'

          echo ""
          echo "=== AOS Architect — Test Session ==="
          echo ""

          echo "--- Container identity ---"
          whoami
          hostname

          echo ""
          echo "--- /root contents ---"
          ls -la /root/

          echo ""
          echo "--- /root/ASISaga repos ---"
          ls /root/ASISaga/ 2>/dev/null && echo "(repos present)" || echo "(not yet cloned)"

          echo ""
          echo "--- ~/.claude/ ---"
          ls -la /root/.claude/ 2>/dev/null || echo "(not yet created — claude login required)"

          echo ""
          echo "--- Claude Code process ---"
          ps aux | grep -v grep | grep claude || echo "(claude not running as a process)"

          echo ""
          echo "--- Claude Code binary ---"
          which claude && claude --version || echo "(claude binary not found)"

          echo ""
          echo "--- gh CLI auth ---"
          gh auth status 2>&1 || echo "(gh not authenticated)"

          echo ""
          echo "--- Environment ---"
          echo "ARCHITECT_GITHUB_TOKEN set: $([ -n "$ARCHITECT_GITHUB_TOKEN" ] && echo yes || echo no)"
          echo "MIND_MCP_URL: ${MIND_MCP_URL:-not set}"

          echo ""
          echo "--- entrypoint.sh last run (process 1) ---"
          cat /proc/1/cmdline 2>/dev/null | tr '\0' ' ' || echo "(cannot read proc/1)"

          echo ""
          echo "=== Test session complete — exiting cleanly ==="
          exit 0
          SHELL
          
          echo "Shell session exited"
