name: Test Architect Session

# Opens an interactive terminal session into the GitHub Actions runner
# via Upterm, from which you can exec into the architect container.
#
# Access is restricted to the GitHub account that triggered the workflow
# — no SSH keys or extra setup needed.
#
# How to use:
#   1. Actions → Test Architect Session → Run workflow
#   2. Watch the log — a session URL appears within ~30 seconds
#   3. Open the URL in your mobile browser — instant terminal
#   4. Run: az containerapp exec --name architect \
#              --resource-group rg-aos-staging --command /bin/bash
#   5. You are inside the architect container
#   6. Type 'exit' to leave the container, 'exit' again to end session

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-session:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure architect container is running
        run: |
          HEALTH=$(az containerapp revision list \
            --name architect \
            --resource-group rg-aos-staging \
            --query "[0].properties.healthState" -o tsv)
          echo "Current health: $HEALTH"
          if [ "$HEALTH" != "Healthy" ]; then
            REVISION=$(az containerapp show \
              --name architect \
              --resource-group rg-aos-staging \
              --query properties.latestRevisionName -o tsv)
            echo "Restarting: $REVISION"
            az containerapp revision restart \
              --name architect \
              --resource-group rg-aos-staging \
              --revision "$REVISION"
            echo "Waiting 60s for cold start..."
            sleep 60
          fi
          echo "Container ready"

      - name: Open session (Upterm)
        uses: lhotari/action-upterm@v1
        with:
          # Restricts access to the GitHub account that triggered
          # this workflow — no SSH keys or extra setup needed
          limit-access-to-actor: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
