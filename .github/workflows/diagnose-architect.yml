name: Diagnose Architect

# On-demand diagnostic workflow for the architect Container App.
# Run this whenever a deployment looks stuck, failed, or behaves
# unexpectedly. Produces a single consolidated report covering:
#   - Container App resource status and revision health
#   - Recent deployment operations from the Activity Log
#   - Console logs (entrypoint.sh stdout/stderr)
#   - System logs (platform-level revision lifecycle events)
#   - Role assignment checks on Key Vault and Storage Account
#   - Secret hygiene check (same validation as deploy-architect.yml)
#
# This workflow only reads — it never modifies any resource.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Secret hygiene check
        run: |
          echo "## Secret hygiene"
          fail=0
          for name in KEY_VAULT_NAME ARCHITECT_GITHUB_TOKEN STORAGE_ACCOUNT_NAME; do
            val="${!name}"
            trimmed="$(printf '%s' "$val" | tr -d '[:space:]')"
            if [ -z "$trimmed" ]; then
              echo "  ❌ $name is empty or unset"
              fail=1
            elif [ "$val" != "$trimmed" ]; then
              echo "  ❌ $name has leading/trailing whitespace or a newline"
              fail=1
            else
              echo "  ✅ $name looks clean"
            fi
          done
          echo ""
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          ARCHITECT_GITHUB_TOKEN: ${{ secrets.ARCHITECT_GITHUB_TOKEN }}
          STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}

      - name: Container App resource status
        run: |
          echo "## Container App resource"
          az containerapp show \
            --name architect \
            --resource-group rg-aos-staging \
            --query "{status:properties.runningStatus, provisioningState:properties.provisioningState, latestRevision:properties.latestRevisionName, fqdn:properties.configuration.ingress.fqdn}" \
            -o jsonc || echo "  ❌ Container App 'architect' not found in rg-aos-staging"
          echo ""

      - name: Revision health
        run: |
          echo "## Revisions"
          az containerapp revision list \
            --name architect \
            --resource-group rg-aos-staging \
            --query "[].{name:name, active:properties.active, provisioningState:properties.provisioningState, healthState:properties.healthState, runningState:properties.runningState, createdTime:properties.createdTime}" \
            -o table || echo "  ❌ Could not list revisions"
          echo ""

      - name: Recent deployment operations (Activity Log, last 2 hours)
        run: |
          echo "## Recent deployment operations"
          az monitor activity-log list \
            --resource-group rg-aos-staging \
            --start-time "$(date -u -d '2 hours ago' +%Y-%m-%dT%H:%M:%SZ)" \
            --query "[?contains(resourceId, 'architect')].{time:eventTimestamp, operation:operationName.localizedValue, status:status.localizedValue}" \
            -o table || echo "  ❌ Could not fetch activity log"
          echo ""

      - name: Container Apps Environment status
        run: |
          echo "## Container Apps Environment"
          az containerapp env show \
            --name cae-aos-staging \
            --resource-group rg-aos-staging \
            --query "{provisioningState:properties.provisioningState, defaultDomain:properties.defaultDomain}" \
            -o jsonc || echo "  ❌ Environment 'cae-aos-staging' not found"
          echo ""

      - name: Role assignment — Key Vault
        run: |
          echo "## Key Vault role check"
          PRINCIPAL_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || true)
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "  ⚠️  Could not resolve service principal — skipping"
          else
            VAULT_ID=$(az keyvault show --name "${{ secrets.KEY_VAULT_NAME }}" --resource-group rg-aos-staging --query id -o tsv 2>/dev/null || true)
            if [ -z "$VAULT_ID" ]; then
              echo "  ❌ Key Vault '${{ secrets.KEY_VAULT_NAME }}' not found"
            else
              ROLES=$(az role assignment list --assignee "$PRINCIPAL_ID" --scope "$VAULT_ID" --query "[].roleDefinitionName" -o tsv)
              if [ -z "$ROLES" ]; then
                echo "  ❌ No roles assigned on Key Vault"
              else
                echo "  ✅ Roles: $ROLES"
              fi
            fi
          fi
          echo ""

      - name: Architect identity — Key Vault read access (runtime)
        run: |
          echo "## Architect identity Key Vault read access"
          # Distinct from the check above: that one verifies the GitHub
          # Actions deploy-time service principal can WRITE secrets.
          # This checks whether id-architect — the identity the running
          # Container App actually uses at runtime — can READ the
          # secret it needs to start. These are two different
          # identities; having one role says nothing about the other.
          ID_PRINCIPAL_ID=$(az identity show \
            --name id-architect \
            --resource-group rg-aos-staging \
            --query principalId -o tsv 2>/dev/null || true)
          if [ -z "$ID_PRINCIPAL_ID" ]; then
            echo "  ⚠️  id-architect managed identity not found — has the Container App been deployed yet?"
          else
            VAULT_ID=$(az keyvault show --name "${{ secrets.KEY_VAULT_NAME }}" --resource-group rg-aos-staging --query id -o tsv 2>/dev/null || true)
            ROLES=$(az role assignment list --assignee "$ID_PRINCIPAL_ID" --scope "$VAULT_ID" --query "[].roleDefinitionName" -o tsv)
            if [ -z "$ROLES" ]; then
              echo "  ❌ id-architect has no roles on Key Vault — secret fetch will fail with 403 at container start"
              echo "     Fix: az role assignment create --role \"Key Vault Secrets User\" --assignee $ID_PRINCIPAL_ID --scope $VAULT_ID"
            else
              echo "  ✅ Roles: $ROLES"
            fi
          fi
          echo ""

      - name: Role assignment — Storage Account
        run: |
          echo "## Storage Account role check"
          PRINCIPAL_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || true)
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "  ⚠️  Could not resolve service principal — skipping"
          else
            ACCOUNT_ID=$(az storage account show --name "${{ secrets.STORAGE_ACCOUNT_NAME }}" --resource-group rg-aos-staging --query id -o tsv 2>/dev/null || true)
            if [ -z "$ACCOUNT_ID" ]; then
              echo "  ❌ Storage account '${{ secrets.STORAGE_ACCOUNT_NAME }}' not found"
            else
              ROLES=$(az role assignment list --assignee "$PRINCIPAL_ID" --scope "$ACCOUNT_ID" --query "[].roleDefinitionName" -o tsv)
              if [ -z "$ROLES" ]; then
                echo "  ❌ No roles assigned on Storage Account"
              else
                echo "  ✅ Roles: $ROLES"
              fi
            fi
          fi
          echo ""

      - name: ACR image existence check
        run: |
          echo "## ACR image check"
          az acr repository show-tags \
            --name acraosstagingerm2srfd \
            --repository aos/architect \
            --query "[?@=='latest' || @=='${{ github.sha }}']" \
            -o tsv || echo "  ❌ Could not query repository tags"
          echo "  (Full tag list:)"
          az acr repository show-tags \
            --name acraosstagingerm2srfd \
            --repository aos/architect \
            -o table || echo "  ❌ Repository 'aos/architect' not found in ACR"
          echo ""

      - name: Architect identity — AcrPull role check
        run: |
          echo "## Architect identity AcrPull role check"
          # id-architect is the user-assigned identity used for BOTH
          # ACR pull and Key Vault secret fetch (see architect-container-
          # app.bicep). The Container App no longer uses a system-
          # assigned identity — checking identity.principalId here would
          # return nothing now that the identity type is UserAssigned only.
          ID_PRINCIPAL_ID=$(az identity show \
            --name id-architect \
            --resource-group rg-aos-staging \
            --query principalId -o tsv 2>/dev/null || true)
          if [ -z "$ID_PRINCIPAL_ID" ]; then
            echo "  ⚠️  id-architect managed identity not found — has the Container App been deployed yet?"
          else
            echo "  id-architect principalId: $ID_PRINCIPAL_ID"
            ACR_ID=$(az acr show --name acraosstagingerm2srfd --query id -o tsv)
            ROLES=$(az role assignment list --assignee "$ID_PRINCIPAL_ID" --scope "$ACR_ID" --query "[].roleDefinitionName" -o tsv)
            if [ -z "$ROLES" ]; then
              echo "  ❌ No roles assigned to id-architect on ACR — image pull will fail with 401 at container start"
              echo "     Fix: az role assignment create --role AcrPull --assignee $ID_PRINCIPAL_ID --scope $ACR_ID"
            else
              echo "  ✅ Roles: $ROLES"
            fi
          fi
          echo ""

      - name: Deployment operation error details
        run: |
          echo "## Deployment operation errors (full detail)"
          az deployment operation group list \
            --resource-group rg-aos-staging \
            --name architect-container-app \
            --query "[?properties.provisioningState=='Failed'].properties.statusMessage" \
            -o jsonc || echo "  ⚠️  Could not fetch deployment operation details"
          echo ""

      - name: Remote Control state check (via Azure Files share — no TTY needed)
        run: |
          echo "## Remote Control state check"
          echo ""
          echo "Diagnosed 2026-07-20: az containerapp exec requires a real TTY"
          echo "for its WebSocket handshake — confirmed it fails with"
          echo "'termios.error: Inappropriate ioctl for device' even for"
          echo "single non-interactive --command invocations from GitHub"
          echo "Actions runners. There is no workaround for that from CI."
          echo ""
          echo "entrypoint.sh now uses Python's pty.spawn() (confirmed"
          echo "working manually — Claude Code's REPL renders correctly,"
          echo "onboarding is skipped) instead of 'script' (confirmed"
          echo "non-functional — produced empty transcripts). The remaining"
          echo "open question is whether Remote Control's session"
          echo "registration with Anthropic's backend succeeds under this"
          echo "PTY. This check reads persisted state from the Azure Files"
          echo "share directly — no TTY needed — to look for evidence."
          echo ""

          mkdir -p /tmp/architect-diag
          KEY=$(az storage account keys list \
            --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
            --resource-group rg-aos-staging \
            --query "[0].value" -o tsv 2>/dev/null || true)

          if [ -z "$KEY" ]; then
            echo "  ❌ Could not retrieve storage account key — skipping"
          else
            echo "### Directory listing: architect-claude-home/"
            az storage file list \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$KEY" \
              --share-name architect-home \
              --path "architect-claude-home" \
              -o table 2>&1 || echo "  ⚠️  Could not list directory (may not exist yet)"
            echo ""

            echo "### .claude.json — session/remote/bridge related keys only"
            echo "(full file is large — this filters to what matters for"
            echo " diagnosing Remote Control specifically)"
            az storage file download \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$KEY" \
              --share-name architect-home \
              --path "architect-claude-home/.claude.json" \
              --dest /tmp/architect-diag/claude.json \
              --output none 2>&1 \
              && grep -oE '"[^"]*(session|remote|bridge|firstStartTime|lastGracefulShutdown|numStartups|machineID|userID)[^"]*"[[:space:]]*:[[:space:]]*[^,}]*' /tmp/architect-diag/claude.json \
              || echo "  ⚠️  Could not download or parse .claude.json"
            echo ""

            echo "### remoteEnabled key — full parent object context"
            echo "Found 'remoteEnabled: false' in the filtered grep above —"
            echo "this is the likely actual root cause. This check finds"
            echo "which parent object it belongs to, to see if it's"
            echo "something we can override or a server-controlled flag."
            python3 "${GITHUB_WORKSPACE}/.github/scripts/find_remote_enabled.py" \
              /tmp/architect-diag/claude.json \
              || echo "  ⚠️  Script failed — see error above"
            echo ""

            echo "### .last-update-result.json content"
            az storage file download \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$KEY" \
              --share-name architect-home \
              --path "architect-claude-home/.last-update-result.json" \
              --dest /tmp/architect-diag/last-update-result.json \
              --output none 2>&1 \
              && cat /tmp/architect-diag/last-update-result.json \
              || echo "  ⚠️  Could not download .last-update-result.json (may not exist)"
            echo ""

            echo "### .credentials.json existence check (not printing contents — sensitive)"
            az storage file show \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$KEY" \
              --share-name architect-home \
              --path "architect-claude-home/.credentials.json" \
              --query "{name:name, lastModified:properties.lastModified, contentLength:properties.contentLength}" \
              -o jsonc 2>&1 \
              || echo "  ⚠️  .credentials.json not found on share"
            echo ""

            echo "### Any file modified in the last 4 hours (recent activity indicator)"
            az storage file list \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$KEY" \
              --share-name architect-home \
              --path "architect-claude-home" \
              --query "[?properties.lastModified >= '$(date -u -d '4 hours ago' +%Y-%m-%dT%H:%M:%SZ)'].{name:name, lastModified:properties.lastModified}" \
              -o table 2>&1 || echo "  ⚠️  Could not check recent modifications"
            echo ""

            rm -rf /tmp/architect-diag
          fi

      - name: Console logs (entrypoint.sh output)
        run: |
          echo "## Console logs (last 300 lines)"
          az containerapp logs show \
            --name architect \
            --resource-group rg-aos-staging \
            --type console \
            --tail "300" \
            --format text || echo "  ⚠️  No console logs available (container may not have started, or logs not yet flushed to Log Analytics)"
          echo ""

      - name: System logs (revision lifecycle events)
        run: |
          echo "## System logs (last 300 lines)"
          az containerapp logs show \
            --name architect \
            --resource-group rg-aos-staging \
            --type system \
            --tail "300" \
            --format json || echo "  ⚠️  No system logs available"
          echo ""

      - name: Summary
        if: always()
        run: |
          echo "## Diagnostic complete"
          echo "Review each section above. Common next steps:"
          echo "  - If revision healthState is not 'Healthy': check console logs for where entrypoint.sh stalled"
          echo "  - If role checks show ❌: grant the missing role via Azure portal IAM, then re-run"
          echo "  - If secret hygiene shows ❌: re-set with printf '%s' \"value\" | gh secret set NAME --repo ASISaga/architect-agent"
          echo "  - If Container App status is Running but Code tab shows no session:"
          echo "    check the Remote Control state check section above (reads directly"
          echo "    from the Azure Files share, no TTY needed). Compare .claude.json"
          echo "    content against what was pre-seeded in container/claude.json —"
          echo "    if Claude Code has added session-related keys, that confirms it"
          echo "    got further than we think. If it's unchanged from the pre-seed,"
          echo "    that suggests Remote Control never wrote any session state at all."
          echo "  - For checks that genuinely require a live process (ps aux, curl,"
          echo "    getent), those still need a real TTY — run manually via:"
          echo "    az containerapp exec --name architect --resource-group rg-aos-staging --command /bin/bash"
