name: Deploy Architect

# Triggered by:
# 1. Push to container/ — uploads dynamic files to Azure Files share
# 2. Push to modules/  — deploys Bicep infrastructure
# 3. repository_dispatch from aos-infra after a new image build
# 4. workflow_dispatch — manual trigger

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - 'modules/**'
  repository_dispatch:
    types: [architect-image-built]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Job 1: Upload dynamic files to Azure Files share
  # Runs when container/ files change, or on dispatch/manual trigger.
  # No image rebuild. No Container App restart.
  # Files take effect at next session start.
  # -------------------------------------------------------------------
  upload-dynamic-files:
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      contains(toJson(github.event.head_commit.modified), 'container/')
    steps:
      - uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          # Catches empty/whitespace-only secrets early with a clear
          # message, instead of failing deep inside an az command with
          # an opaque error. Also strips and re-checks for trailing
          # newlines, which silently corrupt resource-name lookups.
          fail=0
          for name in STORAGE_ACCOUNT_NAME; do
            val="${!name}"
            trimmed="$(printf '%s' "$val" | tr -d '[:space:]')"
            if [ -z "$trimmed" ]; then
              echo "::error::Secret $name is empty or unset."
              fail=1
            elif [ "$val" != "$trimmed" ]; then
              echo "::error::Secret $name contains leading/trailing whitespace or a newline. Re-set it with: printf '%s' \"value\" | gh secret set $name --repo ASISaga/architect-agent"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "Secrets validated"
        env:
          STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm storage account exists
        run: |
          if ! az storage account show \
                --name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
                --resource-group rg-aos-staging \
                -o none 2>/dev/null; then
            echo "::error::Storage account '${{ secrets.STORAGE_ACCOUNT_NAME }}' not found in rg-aos-staging. List existing accounts with: az storage account list --resource-group rg-aos-staging --query '[].name' -o tsv"
            exit 1
          fi

      - name: Confirm caller can write to the file share via OAuth
        run: |
          # Azure Files OAuth (--auth-mode login) requires an explicit
          # data-plane RBAC role on the storage account — being able to
          # see the account (management-plane Reader/Contributor) is not
          # enough. Fail early with a fix command rather than letting
          # the upload fail mid-loop with a generic error.
          PRINCIPAL_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || true)
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "::warning::Could not resolve service principal for AZURE_CLIENT_ID — skipping role check."
          else
            ACCOUNT_ID=$(az storage account show --name "${{ secrets.STORAGE_ACCOUNT_NAME }}" --resource-group rg-aos-staging --query id -o tsv)
            HAS_ROLE=$(az role assignment list \
              --assignee "$PRINCIPAL_ID" \
              --scope "$ACCOUNT_ID" \
              --query "[?roleDefinitionName=='Storage File Data Privileged Contributor' || roleDefinitionName=='Storage File Data SMB Share Contributor' || roleDefinitionName=='Owner' || roleDefinitionName=='Contributor']" \
              -o tsv)
            if [ -z "$HAS_ROLE" ]; then
              echo "::error::Service principal lacks a data-plane role to write to file share on '${{ secrets.STORAGE_ACCOUNT_NAME }}'. Grant it with:"
              echo "az role assignment create --role \"Storage File Data Privileged Contributor\" --assignee ${{ secrets.AZURE_CLIENT_ID }} --scope $ACCOUNT_ID"
              exit 1
            fi
          fi

      - name: Upload dynamic files to Azure Files share
        run: |
          # az storage file upload (Files service) overwrites by default —
          # there is no --overwrite flag for this command (that flag only
          # exists on az storage blob upload). Do not add it back.
          FILES=(
            entrypoint.sh
            repos.txt
            versions.env
            CLAUDE.md
            ARCHITECT-CONTEXT.md
            claude-settings.json
          )
          for f in "${FILES[@]}"; do
            echo "Uploading $f"
            az storage file upload \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --share-name architect-home \
              --source "container/$f" \
              --path "$f" \
              --auth-mode login \
              --enable-file-backup-request-intent
          done
          echo "All dynamic files uploaded"

  # -------------------------------------------------------------------
  # Job 2: Deploy Bicep infrastructure
  # Runs when modules/ change, or on dispatch/manual trigger.
  # Manages: Container App, Key Vault secrets, Azure Files share.
  # Bicep is idempotent — safe to re-run.
  # -------------------------------------------------------------------
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      contains(toJson(github.event.head_commit.modified), 'modules/')
    steps:
      - uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          # Same hygiene check as job 1, covering the secrets this job uses.
          fail=0
          for name in KEY_VAULT_NAME ARCHITECT_GITHUB_TOKEN STORAGE_ACCOUNT_NAME; do
            val="${!name}"
            trimmed="$(printf '%s' "$val" | tr -d '[:space:]')"
            if [ -z "$trimmed" ]; then
              echo "::error::Secret $name is empty or unset."
              fail=1
            elif [ "$val" != "$trimmed" ]; then
              echo "::error::Secret $name contains leading/trailing whitespace or a newline. Re-set it with: printf '%s' \"value\" | gh secret set $name --repo ASISaga/architect-agent"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "Secrets validated"
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          ARCHITECT_GITHUB_TOKEN: ${{ secrets.ARCHITECT_GITHUB_TOKEN }}
          STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm Key Vault exists and is reachable
        run: |
          # Surfaces ParentResourceNotFound-style failures here, with the
          # actual vault name and a list of what does exist, instead of
          # deep inside the Bicep deployment with an opaque ARM error.
          if ! az keyvault show \
                --name "${{ secrets.KEY_VAULT_NAME }}" \
                --resource-group rg-aos-staging \
                -o none 2>/dev/null; then
            echo "::error::Key Vault '${{ secrets.KEY_VAULT_NAME }}' not found in rg-aos-staging."
            echo "Vaults that do exist in this resource group:"
            az keyvault list --resource-group rg-aos-staging --query "[].name" -o tsv
            exit 1
          fi

      - name: Confirm caller can write secrets to the vault
        run: |
          # RBAC-enabled vaults require an explicit role assignment —
          # being able to 'see' the vault (Reader) is not enough to
          # write secrets into it. Fail early with a fix command rather
          # than letting the Bicep deployment fail with a generic error.
          PRINCIPAL_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || true)
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "::warning::Could not resolve service principal for AZURE_CLIENT_ID — skipping role check."
          else
            VAULT_ID=$(az keyvault show --name "${{ secrets.KEY_VAULT_NAME }}" --resource-group rg-aos-staging --query id -o tsv)
            HAS_ROLE=$(az role assignment list \
              --assignee "$PRINCIPAL_ID" \
              --scope "$VAULT_ID" \
              --query "[?roleDefinitionName=='Key Vault Secrets Officer' || roleDefinitionName=='Owner' || roleDefinitionName=='Contributor']" \
              -o tsv)
            if [ -z "$HAS_ROLE" ]; then
              echo "::error::Service principal lacks a role to write secrets to '${{ secrets.KEY_VAULT_NAME }}'. Grant it with:"
              echo "az role assignment create --role \"Key Vault Secrets Officer\" --assignee ${{ secrets.AZURE_CLIENT_ID }} --scope $VAULT_ID"
              exit 1
            fi
          fi

      - name: Deploy architect secrets
        run: |
          az deployment group create \
            --resource-group rg-aos-staging \
            --template-file modules/architect-secrets.bicep \
            --parameters \
              keyVaultName="${{ secrets.KEY_VAULT_NAME }}" \
              architectGithubToken="${{ secrets.ARCHITECT_GITHUB_TOKEN }}"

      - name: Get secret URI
        id: uris
        run: |
          echo "github_uri=$(az keyvault secret show \
            --vault-name "${{ secrets.KEY_VAULT_NAME }}" \
            --name architect-github-token \
            --query id -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy architect infrastructure
        run: |
          az deployment group create \
            --resource-group rg-aos-staging \
            --template-file modules/architect-container-app.bicep \
            --parameters \
              location=eastus2 \
              environmentName=cae-aos-staging \
              acrLoginServer=acraosstagingerm2srfd.azurecr.io \
              acrName=acraosstagingerm2srfd \
              storageAccountName="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              githubTokenSecretUri="${{ steps.uris.outputs.github_uri }}"
