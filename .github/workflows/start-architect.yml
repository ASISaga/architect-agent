name: Start Architect

# Reliable, idempotent start. Safe to run repeatedly — checks state
# before acting so it never errors on "already running" or "already
# activated". Use this instead of manually running az commands from
# Cloud Shell when you just want the container up.
#
# force_restart: use this after Deploy Architect if the container was
# already running — dynamic files uploaded to the Azure Files share
# only take effect on the NEXT boot of entrypoint.sh. An already-
# running container keeps running on whatever it read at its last
# boot, so a plain Start (which correctly no-ops when already running)
# will not pick up the new files. Forcing a restart here re-runs
# entrypoint.sh from scratch against the freshly uploaded files.

on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: 'Force a restart even if already running (use after Deploy Architect to pick up freshly uploaded files)'
        type: boolean
        default: false
        required: false
      overwrite_claude_json:
        description: 'Delete the persisted .claude.json on the share before restarting (use if onboarding keeps reappearing — clears stale/partial state so entrypoint.sh writes the correct pre-seeded file fresh)'
        type: boolean
        default: false
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  start:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Overwrite persisted .claude.json (if requested)
        if: github.event.inputs.overwrite_claude_json == 'true'
        run: |
          echo "Deleting persisted .claude.json from the share — entrypoint.sh"
          echo "will write a fresh, correctly pre-seeded copy on next boot."
          # This lives at architect-claude-home/.claude.json on the share,
          # not container/claude.json (that's the source template we
          # deploy FROM — this is the runtime copy entrypoint.sh writes TO
          # the first time it runs, then never touches again unless it's
          # missing). Deleting it here is the safe way to clear stale or
          # partial state without needing to exec into the container.
          az storage file delete \
            --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
            --share-name architect-home \
            --path "architect-claude-home/.claude.json" \
            --auth-mode login \
            --enable-file-backup-request-intent \
            2>&1 || echo "  (file did not exist — nothing to delete, which is fine)"

      - name: Find latest revision
        id: revision
        run: |
          REVISION=$(az containerapp show \
            --name architect \
            --resource-group rg-aos-staging \
            --query properties.latestRevisionName -o tsv)

          if [ -z "$REVISION" ]; then
            echo "::error::No revision found — the architect Container App may not be deployed"
            exit 1
          fi

          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "Latest revision: $REVISION"

      - name: Check current state
        id: state
        run: |
          STATE=$(az containerapp revision show \
            --name architect \
            --resource-group rg-aos-staging \
            --revision "${{ steps.revision.outputs.revision }}" \
            --query "{active:properties.active, health:properties.healthState, running:properties.runningState}" \
            -o json)

          echo "Current state: $STATE"

          ACTIVE=$(echo "$STATE" | jq -r '.active')
          RUNNING=$(echo "$STATE" | jq -r '.running')

          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "running=$RUNNING" >> "$GITHUB_OUTPUT"

      - name: Activate revision (if deactivated)
        if: steps.state.outputs.active == 'false'
        run: |
          echo "Revision is deactivated — activating"
          az containerapp revision activate \
            --name architect \
            --resource-group rg-aos-staging \
            --revision "${{ steps.revision.outputs.revision }}"

      - name: Restart revision (if stopped but active)
        if: steps.state.outputs.active == 'true' && steps.state.outputs.running == 'Stopped'
        run: |
          echo "Revision is active but stopped — restarting"
          az containerapp revision restart \
            --name architect \
            --resource-group rg-aos-staging \
            --revision "${{ steps.revision.outputs.revision }}"

      - name: Force restart (already running, but force_restart requested)
        if: |
          (steps.state.outputs.running == 'Running' || steps.state.outputs.running == 'RunningAtMaxScale') &&
          github.event.inputs.force_restart == 'true'
        run: |
          echo "Revision is already running, but force_restart was requested"
          echo "Restarting to pick up freshly deployed files from the share"
          az containerapp revision restart \
            --name architect \
            --resource-group rg-aos-staging \
            --revision "${{ steps.revision.outputs.revision }}"

      - name: Already running (no restart requested)
        if: |
          (steps.state.outputs.running == 'Running' || steps.state.outputs.running == 'RunningAtMaxScale') &&
          github.event.inputs.force_restart != 'true'
        run: |
          echo "Revision is already running — nothing to do"
          echo "If you just ran Deploy Architect and need the container to"
          echo "pick up the new files, re-run this workflow with force_restart"
          echo "set to true."

      - name: Poll until running (up to 2 minutes)
        run: |
          # After a force restart, the container briefly reports a
          # transitional state before settling — wait a beat before
          # the first check so we don't read stale state from the
          # instant before the restart took effect.
          sleep 5
          for i in $(seq 1 24); do
            RUNNING=$(az containerapp revision show \
              --name architect \
              --resource-group rg-aos-staging \
              --revision "${{ steps.revision.outputs.revision }}" \
              --query properties.runningState -o tsv)
            echo "[$i/24] runningState: $RUNNING"
            if [ "$RUNNING" = "Running" ] || [ "$RUNNING" = "RunningAtMaxScale" ]; then
              echo "✅ Architect is up"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Did not reach Running state within 2 minutes — check diagnose-architect workflow"

      - name: Pull console logs (bootstrap output)
        if: always()
        run: |
          # Give entrypoint.sh time to actually run through the full
          # bootstrap sequence before pulling logs, so we capture the
          # real outcome rather than an empty or mid-boot snapshot.
          # This replaces manually running az containerapp logs show
          # from Cloud Shell and screenshotting the result.
          echo "Waiting 20s for bootstrap to progress before pulling logs..."
          sleep 20
          echo ""
          echo "=== Console logs (last 80 lines) ==="
          az containerapp logs show \
            --name architect \
            --resource-group rg-aos-staging \
            --type console \
            --tail 80 \
            --format text || echo "  (logs not available yet — may need another run to pull them once bootstrap completes)"

      - name: Summary
        if: always()
        run: |
          echo "## Architect start requested" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Revision: ${{ steps.revision.outputs.revision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Force restart requested: ${{ github.event.inputs.force_restart }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Overwrite .claude.json requested: ${{ github.event.inputs.overwrite_claude_json }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Console logs from this run are in the **Pull console logs** step above." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Connect via: Claude mobile app → Code tab" >> "$GITHUB_STEP_SUMMARY"
          echo "If first time: exec in and run \`claude login\`" >> "$GITHUB_STEP_SUMMARY"
